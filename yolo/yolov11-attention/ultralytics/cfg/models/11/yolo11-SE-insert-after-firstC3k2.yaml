nc: 80  # number of classes
scales:  # model compound scaling constants
  # [depth, width, max_channels]
  n: [0.5, 0.25, 1024]
  s: [0.5, 0.5, 1024]
  m: [0.5, 1.0, 512]
  l: [1.0, 1.0, 512]
  x: [1.0, 1.5, 512]

backbone:
  # [from, repeats, module, args]
  - [-1, 1, "Conv", [64, 3, 2]]
  - [-1, 1, "Conv", [128, 3, 2]]
  - [-1, 2, "C3k2", [256, false, 0.25]]
  - [-1, 1, "SE", [16]]  # <-- inserted SE after first C3k2
  - [-1, 1, "Conv", [256, 3, 2]]
  - [-1, 2, "C3k2", [512, false, 0.25]]
  - [-1, 1, "Conv", [512, 3, 2]]
  - [-1, 2, "C3k2", [512, true]]
  - [-1, 1, "Conv", [1024, 3, 2]]
  - [-1, 2, "C3k2", [1024, true]]
  - [-1, 1, "SPPF", [1024, 5]]
  - [-1, 2, "C2PSA", [1024]]

head:
  - [-1, 1, "nn.Upsample", ["None", 2, "nearest"]]
  - [[-1, 7], 1, "Concat", [1]]
  - [-1, 2, "C3k2", [512, false]]
  - [-1, 1, "nn.Upsample", ["None", 2, "nearest"]]
  - [[-1, 5], 1, "Concat", [1]]
  - [-1, 2, "C3k2", [256, false]]
  - [-1, 1, "Conv", [256, 3, 2]]
  - [[-1, 14], 1, "Concat", [1]]
  - [-1, 2, "C3k2", [512, false]]
  - [-1, 1, "Conv", [512, 3, 2]]
  - [[-1, 11], 1, "Concat", [1]]
  - [-1, 2, "C3k2", [1024, true]]
  - [[17, 20, 23], 1, "Detect", ["nc"]]
